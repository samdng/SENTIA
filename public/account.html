<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account | SENTIA</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
              400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
              800: '#1e40af', 900: '#1e3a8a',
            },
            accent: {
              500: '#10b981', 600: '#059669',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style type="text/tailwindcss">
    @layer utilities {
      .glassmorphism {
        @apply bg-white/70 dark:bg-slate-900/70 backdrop-blur-md border border-white/20 dark:border-slate-700/50 shadow-xl;
      }
    }
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
  <script src="db.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex overflow-hidden relative transition-colors duration-300">

  <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-20">
    <div class="absolute inset-0 bg-[url('images/background.png')] bg-cover bg-center blur-md scale-110 opacity-40 dark:opacity-20 transition-opacity"></div>
  </div>

  <!-- LEFT SIDEBAR -->
  <aside class="w-64 border-r border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md hidden md:flex flex-col h-screen p-4 flex-shrink-0 relative z-20 shadow-sm transition-colors">
    <div class="px-4 py-6 mb-4">
      <h1 class="text-3xl font-extrabold tracking-tight">
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-600 to-accent-500">SENTIA</span>
      </h1>
    </div>
    <nav class="flex-1 space-y-2">
      <a href="dashboard.html" class="flex items-center gap-4 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl font-semibold transition-colors fade-link">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
          <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
        </svg>
        Activity
      </a>
      <a href="account.html" class="flex items-center gap-4 px-4 py-3 bg-primary-50 dark:bg-primary-900/30 border border-primary-200 dark:border-primary-800/50 text-primary-700 dark:text-primary-400 rounded-xl font-bold transition-colors shadow-sm fade-link">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
        </svg>
        Account
      </a>
      <a href="settings.html" class="flex items-center gap-4 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl font-semibold transition-colors fade-link">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
        </svg>
        Settings
      </a>
      <a href="index.html" onclick="DB.logout()" class="flex items-center gap-4 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-red-600 dark:hover:text-red-500 rounded-xl font-semibold transition-colors mt-auto fade-link">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400 group-hover:text-red-500" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" />
        </svg>
        Logout
      </a>
    </nav>
  </aside>

  <!-- CENTER: Main Content -->
  <main class="flex-1 overflow-y-auto relative h-screen p-8">
    <div class="max-w-2xl mx-auto mt-10">
      <div class="glassmorphism rounded-3xl p-8 shadow-xl">
        <h2 class="text-3xl font-bold mb-8">Account Details</h2>
        
        <form id="account-form" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Full Name</label>
              <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800 focus:ring-2 focus:ring-primary-500 transition-all outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email Address</label>
              <input type="email" id="email" required disabled class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-900 text-slate-500 outline-none cursor-not-allowed">
              <p class="text-xs text-slate-500 mt-1">Email cannot be changed.</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Country</label>
              <input type="text" id="country" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800 focus:ring-2 focus:ring-primary-500 transition-all outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Phone Number</label>
              <input type="tel" id="phone" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800 focus:ring-2 focus:ring-primary-500 transition-all outline-none">
            </div>
          </div>
          
          <div class="flex items-center justify-end gap-4 pt-6 mt-6 border-t border-slate-200 dark:border-slate-700">
            <button type="submit" class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-bold rounded-xl shadow-lg transition-all">Save Changes</button>
          </div>
        </form>

        <div class="mt-12 pt-8 border-t border-slate-200 dark:border-slate-700">
          <h3 class="text-xl font-bold text-red-600 mb-2">Danger Zone</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Once you delete your account, there is no going back. Please be certain.</p>
          <button id="delete-btn" class="px-6 py-3 bg-red-100 dark:bg-red-900/30 text-red-600 hover:bg-red-200 dark:hover:bg-red-900/50 font-bold rounded-xl transition-all">Delete Account</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.body.style.opacity = 1;
      
      const user = DB.getCurrentUser();
      if (!user) { window.location.href = 'login.html'; return; }

      document.getElementById('name').value = user.name || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('country').value = user.country || '';
      document.getElementById('phone').value = user.phone || '';

      document.getElementById('account-form').addEventListener('submit', (e) => {
        e.preventDefault();
        DB.updateUser({
          name: document.getElementById('name').value,
          country: document.getElementById('country').value,
          phone: document.getElementById('phone').value,
        });
        alert('Account updated successfully!');
      });

      document.getElementById('delete-btn').addEventListener('click', () => {
        if(confirm("Are you absolutely sure you want to delete your account? This action cannot be undone.")) {
          DB.deleteUser();
          window.location.href = 'index.html';
        }
      });

      const fadeLinks = document.querySelectorAll('.fade-link');
      fadeLinks.forEach(link => {
        link.addEventListener('click', function(e) {
          if (this.href.endsWith('#')) return;
          e.preventDefault();
          const target = this.href;
          document.body.style.transition = 'opacity 0.3s ease-out';
          document.body.style.opacity = 0;
          setTimeout(() => { window.location.href = target; }, 300);
        });
      });
    });
  </script>
</body>
</html>
