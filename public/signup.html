<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | SENTIA</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            },
            accent: {
              500: '#10b981',
              600: '#059669',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.6s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style type="text/tailwindcss">
    @layer utilities {
      .glassmorphism {
        @apply bg-white/60 backdrop-blur-xl border border-white/40 shadow-2xl;
      }
    }
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
  <script src="db.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden py-10">

  <!-- Background decorations -->
  <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-20">
    <div class="absolute inset-0 bg-[url('images/background.png')] bg-cover bg-center blur-md scale-110 opacity-40"></div>
  </div>
  <div class="absolute inset-0 z-0 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary-300 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-accent-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30"></div>
  </div>

  <!-- Back button -->
  <a href="index.html" class="fixed top-6 left-6 z-20 flex items-center text-slate-600 hover:text-primary-600 transition-colors font-medium fade-link">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    Back to Home
  </a>

  <!-- Signup Card -->
  <div class="relative z-10 w-full max-w-lg animate-slide-up mt-10">
    <div class="glassmorphism rounded-3xl p-8 sm:p-10">
      
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-slate-900 mb-2">Create Account</h2>
        <p class="text-slate-500">Join SENTIA to start your mental wellness journey.</p>
      </div>

      <!-- Form -->
      <form id="signup-form" class="space-y-4">
        
        <div>
          <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
          <input type="text" id="name" name="name" required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none"
            placeholder="John Doe">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="country" class="block text-sm font-medium text-slate-700 mb-1">Country</label>
            <input type="text" id="country" name="country" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none"
              placeholder="e.g. USA">
          </div>
          <div>
            <label for="phone" class="block text-sm font-medium text-slate-700 mb-1">Phone Number</label>
            <input type="tel" id="phone" name="phone" required
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none"
              placeholder="+1 234 567 890">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none"
            placeholder="you@example.com">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none"
            placeholder="••••••••">
        </div>

        <div>
          <label for="confirm-password" class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" required
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none"
            placeholder="••••••••">
        </div>

        <button type="submit" class="w-full py-4 mt-6 bg-primary-600 hover:bg-primary-700 text-white font-bold rounded-xl shadow-lg hover:shadow-primary-500/40 transition-all duration-300 transform hover:-translate-y-0.5">
          Sign Up
        </button>

      </form>

      <div class="mt-8 text-center">
        <p class="text-sm text-slate-600">
          Already have an account? <a href="login.html" class="font-medium text-primary-600 hover:text-primary-500 fade-link">Sign In</a>
        </p>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const country = document.getElementById('country').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      const userData = { name, country, phone, email, password };
      
      const success = DB.signup(userData);
      if (success) {
        document.body.style.transition = 'opacity 0.3s ease-out';
        document.body.style.opacity = 0;
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 300);
      } else {
        alert('An account with this email already exists.');
      }
    });

    // Page Transition Logic
    document.addEventListener("DOMContentLoaded", () => {
      document.body.style.opacity = 1;
    });

    const fadeLinks = document.querySelectorAll('.fade-link');
    fadeLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const target = this.href;
        document.body.style.transition = 'opacity 0.3s ease-out';
        document.body.style.opacity = 0;
        setTimeout(() => {
          window.location.href = target;
        }, 300);
      });
    });
  </script>
</body>
</html>
