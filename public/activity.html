<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity | SENTIA</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            },
            accent: {
              500: '#10b981',
              600: '#059669',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .pulse-ring {
      animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
  </style>
</head>
<body class="bg-white text-slate-800 min-h-screen flex flex-col relative overflow-hidden">

  <!-- Top Bar: Close & Progress -->
  <header class="w-full max-w-4xl mx-auto px-4 py-8 flex items-center gap-4 z-10 relative">
    <!-- Close Button -->
    <a href="dashboard.html" class="text-slate-400 hover:text-slate-600 transition-colors p-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </a>
    
    <!-- Progress Bar -->
    <div class="flex-1 h-4 bg-slate-100 rounded-full overflow-hidden relative shadow-inner">
      <!-- The progress fill (e.g. 20%) -->
      <div class="absolute top-0 left-0 h-full bg-primary-500 rounded-full transition-all duration-500 w-1/5 relative overflow-hidden">
        <!-- Light reflection on the bar -->
        <div class="absolute top-1 left-2 right-2 h-1 bg-white/30 rounded-full"></div>
      </div>
    </div>
  </header>

  <!-- Main Activity Content -->
  <main class="flex-1 w-full max-w-3xl mx-auto px-4 py-4 flex flex-col relative z-10">
    
    <!-- Level Name & Objective -->
    <div class="mb-10">
      <h2 class="text-primary-600 font-bold text-sm tracking-widest uppercase mb-3 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        Node 1 — First Steps
      </h2>
      <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800">Establish a daily habit</h1>
    </div>

    <!-- The Activity Task -->
    <div class="flex-1 flex flex-col items-center justify-center">
      
      <div class="text-center mb-12">
        <h3 class="text-2xl font-bold text-slate-700 mb-2">1-Minute Guided Breathing</h3>
        <p class="text-slate-500">Take a moment to center yourself before we start.</p>
      </div>

      <!-- Breathing Animation Mockup -->
      <div class="relative w-48 h-48 flex items-center justify-center mb-12">
        <div class="absolute inset-0 bg-primary-100 rounded-full pulse-ring"></div>
        <div class="absolute inset-4 bg-primary-200 rounded-full opacity-60"></div>
        <div class="relative z-10 w-24 h-24 bg-primary-500 rounded-full shadow-lg shadow-primary-500/40 flex items-center justify-center text-white cursor-pointer hover:scale-105 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
          </svg>
        </div>
      </div>

      <!-- Activity Checklist Mockup (Optional to show the list of activities) -->
      <div class="w-full max-w-md bg-slate-50 rounded-2xl border border-slate-200 p-6 shadow-sm">
        <p class="text-sm font-bold text-slate-500 uppercase tracking-wide mb-4">Activities in this node</p>
        <ul class="space-y-3">
          <li class="flex items-center gap-3 text-slate-800 font-semibold">
            <div class="w-6 h-6 rounded-full bg-primary-500 flex items-center justify-center text-white">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            1-minute guided breathing
          </li>
          <li class="flex items-center gap-3 text-slate-400 font-medium">
            <div class="w-6 h-6 rounded-full border-2 border-slate-300"></div>
            Choose how you're feeling today
          </li>
          <li class="flex items-center gap-3 text-slate-400 font-medium">
            <div class="w-6 h-6 rounded-full border-2 border-slate-300"></div>
            Write down one good thing
          </li>
        </ul>
      </div>

    </div>
  </main>

  <!-- Bottom Bar: Actions -->
  <footer class="w-full border-t-2 border-slate-200 bg-white p-4 relative z-20">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      
      <!-- Skip Button -->
      <button class="px-6 md:px-8 py-3 md:py-4 rounded-xl font-bold text-slate-400 uppercase tracking-wide hover:bg-slate-100 hover:text-slate-600 transition-colors">
        Skip
      </button>

      <!-- Check Button -->
      <!-- Added onclick to simulate completing the activity and going back to dashboard -->
      <button onclick="window.location.href='dashboard.html'" class="px-8 md:px-12 py-3 md:py-4 bg-primary-500 text-white font-bold rounded-xl uppercase tracking-widest shadow-[0_4px_0_#2563eb] hover:translate-y-[2px] hover:shadow-[0_2px_0_#2563eb] transition-all text-lg">
        Check
      </button>

    </div>
  </footer>

</body>
</html>
